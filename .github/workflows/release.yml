name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Statically linked musl builds: no glibc dependency, so they run on
          # any Linux regardless of the host glibc version (e.g. Ubuntu 22.04).
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: mde-cli
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: mde-cli
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: mde-cli
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mde-cli
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # cargo-zigbuild links musl targets via zig as the C toolchain, so both
      # x86_64 and aarch64 cross-compile without installing per-target gcc.
      # cargo-zigbuild does NOT bundle zig, so zig must be installed separately.
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        if: contains(matrix.target, 'linux-musl')
        with:
          version: 0.13.0
          # Disable caching: release builds must not consume runtime caches
          # that a less-trusted workflow could poison (supply-chain hardening).
          use-cache: false
      - uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        if: contains(matrix.target, 'linux-musl')
        with:
          tool: cargo-zigbuild@0.22.1

      - name: Build (musl via zigbuild)
        if: contains(matrix.target, 'linux-musl')
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Build
        if: ${{ !contains(matrix.target, 'linux-musl') }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../mde-cli-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mde-cli-${{ matrix.target }}
          path: mde-cli-${{ matrix.target }}.tar.gz

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: cargo-cyclonedx@0.5.9

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json --override-filename mde-cli-sbom
          mv mde-cli-sbom.json artifacts/mde-cli-sbom.cdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: artifacts/*.tar.gz

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: gh release create "$REF_NAME" artifacts/* --generate-notes
